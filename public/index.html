<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentStream — The AI House</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #fff;
    }

    #canvas-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 1920px;
      height: 1080px;
      max-width: 100vw;
      max-height: 100vh;
      aspect-ratio: 16 / 9;
    }

    /* Scale canvas to fit viewport while keeping 16:9 */
    @media (max-aspect-ratio: 16/9) {
      #canvas-container {
        width: 100vw;
        height: auto;
      }
    }
    @media (min-aspect-ratio: 16/9) {
      #canvas-container {
        width: auto;
        height: 100vh;
      }
    }

    #canvas-container canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }

    /* Overlay shared styles */
    .overlay {
      position: absolute;
      pointer-events: none;
      z-index: 10;
    }

    .overlay * {
      pointer-events: auto;
    }

    /* HUD — top bar */
    #hud {
      top: 0;
      left: 0;
      right: 0;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
      font-size: 14px;
    }

    #hud-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .live-dot {
      width: 12px;
      height: 12px;
      background: #e74c3c;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    #hud-center {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      text-align: center;
      line-height: 1.2;
    }

    #hud-center .subtitle {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.5px;
      text-transform: none;
      opacity: 0.6;
    }

    #hud-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 15px;
    }

    .char-status {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .char-status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    /* Debug overlay */
    #debug-overlay {
      top: 60px;
      left: 12px;
      width: 380px;
      max-height: calc(100% - 120px);
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
      display: none;
    }

    #debug-overlay.visible {
      display: block;
    }

    #debug-overlay h3 {
      color: #0f0;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .debug-char {
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    /* Operator panel */
    #operator-panel {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 520px;
      background: rgba(15, 15, 25, 0.95);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 24px;
      display: none;
      z-index: 20;
    }

    #operator-panel.visible {
      display: block;
    }

    #operator-panel h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #aaa;
      font-weight: 600;
    }

    #operator-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
    }

    #operator-input:focus {
      border-color: rgba(255,255,255,0.4);
    }

    #operator-submit {
      margin-top: 12px;
      padding: 10px 24px;
      background: #3498db;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #operator-submit:hover {
      background: #2980b9;
    }

    /* Ticker — bottom */
    #ticker {
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
      display: flex;
      align-items: center;
      overflow: hidden;
      padding: 0 16px;
    }

    #ticker-content {
      display: flex;
      gap: 48px;
      white-space: nowrap;
      animation: scroll-left 30s linear infinite;
      font-size: 15px;
      color: rgba(255,255,255,0.7);
    }

    @keyframes scroll-left {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .ticker-item {
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="canvas-container">
    <!-- PixiJS canvas will be appended here -->

    <div id="hud" class="overlay">
      <div id="hud-left">
        <div class="live-indicator">
          <span class="live-dot"></span>
          <span>LIVE</span>
        </div>
      </div>
      <div id="hud-center">
        <div>THE AI HOUSE</div>
        <div class="subtitle">AI characters live together. Watch what happens.</div>
      </div>
      <div id="hud-right"></div>
    </div>

    <div id="debug-overlay" class="overlay"></div>

    <div id="operator-panel" class="overlay">
      <h2>Operator Console</h2>
      <input id="operator-input" type="text" placeholder="Send a directive to the house..." autocomplete="off" />
      <button id="operator-submit">Send</button>
    </div>

    <div id="ticker" class="overlay">
      <div id="ticker-content"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
